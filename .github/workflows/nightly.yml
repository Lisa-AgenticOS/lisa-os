# Nightly image pipeline (PLAN §6). Builds the Track I image and
# boot-checks it in QEMU. Runs inside a real Arch container (rootful
# podman, privileged) so mkosi uses Arch's own pacman — the default
# Debian tools tree on Ubuntu runners ships a pacman without its cache
# dir. swtpm + the A/B sysupdate rollback demo complete the M0 gate.

name: nightly-image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Expose /dev/kvm
        run: |
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; else echo "no KVM; QEMU will fall back to TCG"; fi
      - name: Build and boot-check in Arch container
        run: |
          KVMFLAG=""
          [ -e /dev/kvm ] && KVMFLAG="--device /dev/kvm"
          sudo podman run --rm --privileged $KVMFLAG \
            -v "$PWD":/src -w /src docker.io/library/archlinux:latest bash -ec '
              # pacman >= 7 sandbox cannot apply inside the container
              sed -i "/^\[options\]/a DisableSandbox" /etc/pacman.conf
              pacman -Syu --noconfirm mkosi qemu-base edk2-ovmf
              mkosi --directory os/mkosi summary
              mkosi --directory os/mkosi build
              timeout 900 mkosi --directory os/mkosi \
                --kernel-command-line-extra="systemd.unit=poweroff.target" \
                qemu
            '
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: lisa-image
          path: os/mkosi/lisa*.raw
          if-no-files-found: warn
          retention-days: 7
