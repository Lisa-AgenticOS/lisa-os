# Lisa initrd overlay (ADR-0017). mkosi builds the Track I image's initrd
# from this directory when present, extending the default mkosi-initrd.
#
# Purpose: carry Plymouth *and the lisa theme* in the initrd so the violet
# Lisa splash appears from the earliest boot stage — right after the Mac's
# Apple logo — instead of only at sysinit.target in the rooted system, which
# left a long black window on the field iMac ("looks powered off"). The theme
# ships alongside (mkosi.extra), so this is never the theme-less default flash
# the earlier design avoided. simpledrm (KernelModulesInitrdInclude in the
# parent mkosi.conf) gives Plymouth the EFI framebuffer with no firmware blob;
# amdgpu takes over later in the rooted system.
[Content]
Packages=plymouth
