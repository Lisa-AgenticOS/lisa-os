# Lisa OS image profile (Track I, ADR-0001). M0 target: boots in QEMU via
# `just vm` with A/B update + rollback demonstrated (PLAN §10).
#
# Build on Linux only: `mkosi --directory os/mkosi build` (CI's job —
# .github/workflows/nightly.yml). The pinned Arch snapshot mirror
# (os/repo-tools) replaces the default mirrors before beta.

[Distribution]
Distribution=arch

[Build]
# Bootstrap a pacman-capable tools tree so the image builds on any host
# distro (CI runs on Ubuntu runners).
ToolsTree=default

[Output]
Format=disk
ImageId=lisa
# Baked into /usr/lib/os-release as IMAGE_VERSION= (release.yml rewrites the
# "1" to the real YYYYMMDD.run version). systemd-sysupdate reads this to
# determine the installed version; without it, `lisa update --reboot` errors
# with "/etc/os-release lacks IMAGE_VERSION= field" and never reboots.
ImageVersion=1
Output=lisa

[Content]
Bootable=yes
Hostname=lisa
# Bake timezone/locale/keymap so systemd-firstboot has nothing to prompt.
# Without these, first boot stops at an interactive "select timezone"
# question on the console before gdm — a default of the image, not
# something the user set. These are changeable later in GNOME Settings ›
# Date & Time / Region (or edit these lines + rebuild). Timezone follows
# the field device's locale (Europe/Tirane); UTC is the neutral fallback.
Timezone=Europe/Tirane
Locale=en_US.UTF-8
Keymap=us
# Find root deterministically by the GPT partition label repart sets
# (Label=root_1; release builds bump it to root_<ver> and keep this in
# sync). gpt-auto-root is unreliable on real hardware with other disks
# present — an explicit PARTLABEL always resolves. `rw` for btrfs.
# Boot splash (PLAN §3/§6): `quiet splash` engages Plymouth (the `lisa`
# theme, violet + wordmark) and keeps the framebuffer free of kernel/unit
# text — the Mac shows the Apple logo, then the Lisa splash, then GDM. No
# scrolling console. `console=ttyS0` routes ALL kernel/systemd output to
# the serial line instead of tty0, so (a) the framebuffer stays clean for
# Plymouth on the real display, and (b) CI keeps a serial log — though the
# CI boot-check supplies its OWN `-append` (nightly.yml/release.yml) and
# never reads this line, so it is unaffected either way. A boot hang is no
# longer photographable on-screen; it is instead captured by
# lisa-boot-report.service dumping the journal to the ESP (postinst).
# Plymouth degrades to a blank/text screen if it fails — it never blocks
# boot.
KernelCommandLine=root=PARTLABEL=root_1 rw quiet splash console=ttyS0
# Initrd must mount btrfs root AND drive input on bare metal — without
# USB HID here, a rescue prompt has no keyboard (Apple wired keyboards
# included). Broad USB/HID + storage set keeps unknown hardware bootable.
KernelModulesInitrdInclude=
        btrfs
        usbhid
        hid_generic
        hid_apple
        xhci_pci
        xhci_hcd
        ehci_pci
        uhci_hcd
        usb_storage
        nvme
        ahci
        # DRM framebuffer for the early Plymouth splash (mkosi.initrd): on
        # EFI, simpledrm binds the firmware GOP framebuffer immediately — no
        # firmware blob needed — so the Lisa logo shows right after the Apple
        # logo. amdgpu (needs firmware) takes over later in the rooted system.
        simpledrm
Packages=
        base
        linux
        linux-firmware
        # Arch splits linux-firmware into per-vendor subpackages; name the
        # ones field hardware needs so a change in the meta package's
        # dependency set can never silently drop them. First field target
        # is an iMac18,2: Radeon Pro 560 (amdgpu — no blob, no display)
        # and BCM43602 Wi-Fi (brcmfmac).
        linux-firmware-amdgpu
        linux-firmware-broadcom
        systemd
        systemd-ukify
        # Graphical boot splash (PLAN §3/§6). Ships plymouthd + the
        # plymouth-quit*/read-write units that hand the framebuffer to GDM,
        # and renders the `lisa` theme (mkosi.extra/.../themes/lisa). Present
        # in the rooted system; plymouth-start is wired into sysinit.target
        # via mkosi.extra so the splash comes up even though mkosi's own
        # initrd does not carry Plymouth (see README "Boot splash").
        plymouth
        btrfs-progs
        iwd
        # Bluetooth stack + bluetoothctl for pairing Apple Magic input
        # devices (USB HID needs nothing extra; hid_apple is in-kernel).
        bluez
        bluez-utils
        sudo
        vim
        # SSH server: a headless field device must be reachable without a
        # keyboard-at-the-console. Enabled by the preset; password auth
        # against the provisional lisa/lisa account until the M7 OOBE and
        # key-based access land.
        openssh
        # --- GNOME desktop session (PLAN §3 "Desktop environment
        # strategy": GNOME base, patched not forked; the M4 §5.7
        # surfaces ride on it as Shell extensions). Deliberately NOT
        # the `gnome` group — every name below earns its place.
        # Display manager; autologin config in mkosi.extra/etc/gdm.
        gdm
        # The compositor/shell the §5.7 extensions load into (GNOME 46+
        # ESM). Pulls mutter, gjs, gnome-settings-daemon, gtk4.
        gnome-shell
        gnome-session
        # Terminal in the desktop (§5.8: `lisa` CLI preinstalled needs
        # a terminal to live in; gnome-console is GNOME's minimal one).
        gnome-console
        # Settings app — the field iMac had no way to open Settings
        # (gnome-shell alone ships no control-center). Network, display,
        # sound, and the Intelligence panel (§5.5) will live here.
        gnome-control-center
        # Portals are the trust boundary (§5.5); the GNOME backend +
        # the GTK fallback (file chooser et al.) make portal calls real
        # in the session instead of hanging.
        xdg-desktop-portal-gnome
        xdg-desktop-portal-gtk
        # GL/EGL drivers — mutter needs a renderer: radeonsi for the
        # iMac18,2's Radeon Pro 560, llvmpipe fallback in QEMU/CI.
        mesa
        # X11 apps under the Wayland session (gnome-shell optdepends).
        xorg-xwayland
        # Fonts: GNOME's UI face + broad text coverage (incl. Noto Sans
        # Mono for gnome-console). Without any font the shell renders
        # boxes. CJK variants deferred (size).
        cantarell-fonts
        noto-fonts
        # PipeWire session manager: pulls pipewire and makes it start;
        # mutter/portal ScreenCast (§5.7.4 groundwork) and audio need a
        # running session manager, not just the libraries.
        wireplumber
        # Wi-Fi from the desktop UI: gnome-shell's network indicator
        # only speaks NetworkManager (libnm is a gnome-shell dep; the
        # daemon is not). Runs with wifi.backend=iwd — iwd stays the
        # supplicant (conf in mkosi.extra); NM owns all interfaces,
        # see mkosi.postinst.chroot.
        networkmanager
        # Dart SDK (official): the Forge/LisaCode harness runs `dart
        # analyze` in its plan→edit→analyze loop (§5.12.1). Full Flutter
        # (AUR, ~1.5 GiB) for building runnable apps is a separate, opt-in
        # package — dart alone keeps the harness loop working.
        dart

[Validation]
# Signed UKI + SecureBoot keys wired in once the M0 boot test is green.
SecureBoot=no
