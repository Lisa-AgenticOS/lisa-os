# Shared local-model store (PLAN §5.1). The login user (in group `lisa`)
# downloads models here via Settings / `lisa models get`; lisa-inferenced
# reads them (world-readable) to serve inference. setgid (2775) so every
# downloaded file inherits group `lisa`; kept outside /var/lib/lisa so it
# never clashes with inferenced's private StateDirectory. On the persistent
# /var partition, so models survive A/B updates.
d /var/lib/lisa-models 2775 root lisa -
d /var/lib/lisa-models/refs 2775 root lisa -
d /var/lib/lisa-models/blobs 2775 root lisa -
