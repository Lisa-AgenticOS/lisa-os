# Pull Plymouth (and, via the default.plymouth symlink, the `lisa` theme +
# plymouthd.conf) into any dracut-generated initramfs, so the violet Lisa
# splash appears from the earliest boot stage — right after the Mac's
# firmware/Apple logo, before the root switch.
#
# The mkosi Track I image builds its own systemd initrd (mkosi-initrd),
# NOT dracut, so this file does not affect that initrd; there, Plymouth is
# started in the rooted system by the sysinit.target.wants/plymouth-start
# symlink instead. This conf governs dracut-driven initrd regeneration on
# an installed system and the Track L pacman layer (os/layer), where it
# gives the splash from initrd onward.
add_dracutmodules+=" plymouth "
