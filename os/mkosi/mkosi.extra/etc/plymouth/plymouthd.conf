# Authoritative Plymouth daemon config for Lisa OS. The `[Daemon] Theme=`
# key is what plymouthd reads to pick the boot theme; setting it here is
# deterministic in the immutable image (no `plymouth-set-default-theme`
# run needed). `default.plymouth` also symlinks to lisa/lisa.plymouth for
# tooling (dracut's plymouth module, plymouth-set-default-theme) that keys
# off the symlink instead.
[Daemon]
Theme=lisa
