# Mutable state that MUST survive A/B image updates: NetworkManager wifi
# profiles, Bluetooth bonds, the model store, journald logs. This is a
# separate, persistent partition — updates replace the root slot but never
# touch /var.
#
# Mounted by PARTLABEL (ADR-0018), via a shipped `var.mount` unit
# (mkosi.extra/.../systemd/system/var.mount) — NOT by fs-UUID or PARTUUID, and
# NOT via repart's MountPoint=/var fstab generation. Why: both the filesystem
# UUID (from Format=) and the partition PARTUUID are assigned FRESH on every
# image build and baked into that slot's fstab, but the persistent /var keeps
# the identifiers from the ORIGINAL install. So a sysupdated slot's fstab
# pointed at an identifier the disk's /var never had → `/var` failed to mount →
# `Local File Systems` failed → the box dropped to EMERGENCY MODE (nightly
# ab-sysupdate regression; the field iMac was hand-patched every update). The
# partition LABEL `var` is identical on every build and on the installed disk,
# so every slot mounts the one persistent partition with no per-slot patching.
# (gpt-auto is inert here — the UKIs carry an explicit root= — so an explicit
# mount is needed regardless. Cross-disk label ambiguity is out of scope: one
# Lisa disk per machine.)
#
# An empty first-boot partition is fine: tmpfiles.d + the services repopulate
# /var/lib/{lisa-models,NetworkManager,bluetooth}. lisa-model-store.service
# stays as a belt-and-suspenders fallback. Content-addressed, PLAN §3.
[Partition]
Type=var
Format=btrfs
SizeMinBytes=2G
Label=var
