# Mutable state that MUST survive A/B image updates: NetworkManager wifi
# profiles, Bluetooth bonds, the model store, journald logs. This is a
# separate, persistent partition — updates replace the root slot but never
# touch /var.
#
# MountPoint=/var makes mkosi's `repart --generate-fstab` bake a `/var`
# entry (by PARTUUID) into every slot's /etc/fstab, mounted early by
# systemd-fstab-generator. We need this because gpt-auto's /var discovery is
# INERT on this image: the UKIs carry an explicit `root=`, which tells systemd
# the admin manages mounts, so gpt-auto never generates a var.mount (confirmed
# on hardware, 2026-07-24). An empty first-boot partition is fine: tmpfiles.d +
# the services repopulate /var/lib/{lisa-models,NetworkManager,bluetooth}.
# lisa-model-store.service stays as a belt-and-suspenders fallback (it
# self-exits once /var is the partition). Content-addressed, PLAN §3.
#
# UUID is PINNED to a constant (ADR-0018). Without it, every image build
# assigns /var a fresh random PARTUUID and bakes THAT into the slot's fstab —
# but the persistent /var partition keeps the PARTUUID from the ORIGINAL
# install, so a sysupdated slot's fstab points at a PARTUUID that no longer
# exists → `/var` fails to mount → Local File Systems fails → emergency mode
# (nightly ab-sysupdate, regression since 2026-07-24). A fixed PARTUUID makes
# every slot's baked fstab match the one persistent partition. (Cross-disk
# ambiguity is a non-issue: one Lisa disk per machine; root= is explicit.)
[Partition]
Type=var
Format=btrfs
SizeMinBytes=2G
MountPoint=/var
UUID=489dedcf-8291-4e00-bfc5-ef6b6d5f2131
