# Mutable state that MUST survive A/B image updates: NetworkManager wifi
# profiles, Bluetooth bonds, the model store, journald logs. This is a
# separate, persistent partition — updates replace the root slot but never
# touch /var.
#
# MountPoint=/var makes mkosi's `repart --generate-fstab` bake a `/var`
# entry (by PARTUUID — unique, so no cross-disk PARTLABEL ambiguity) into
# every slot's /etc/fstab, mounted early by systemd-fstab-generator. We
# need this because gpt-auto's /var discovery is INERT on this image: the
# UKIs carry an explicit `root=`, which tells systemd the admin manages
# mounts, so gpt-auto never generates a var.mount (confirmed on hardware,
# 2026-07-24) — regardless of whether the partition UUID matches the
# machine-id. An empty first-boot partition is fine: tmpfiles.d + the
# services repopulate /var/lib/{lisa-models,NetworkManager,bluetooth}.
# lisa-model-store.service stays as a belt-and-suspenders fallback (it
# self-exits once /var is the partition). Content-addressed, PLAN §3.
[Partition]
Type=var
Format=btrfs
SizeMinBytes=2G
MountPoint=/var
