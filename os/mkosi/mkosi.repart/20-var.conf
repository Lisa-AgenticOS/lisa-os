# Mutable state, survives image updates. NOTE: systemd only auto-mounts a
# `var` partition at /var when its GPT UUID equals the machine-id, which
# never holds after a `lisa install` (fresh machine-id ≠ this baked UUID) —
# so /var stays on the root fs and this partition is claimed for the model
# store (/var/lib/lisa-models) by lisa-model-store.service, which also grows
# the btrfs the first-boot repart leaves at 2G. Content-addressed, PLAN §3.
[Partition]
Type=var
Format=btrfs
SizeMinBytes=2G
