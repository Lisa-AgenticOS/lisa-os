# Root slot A (ADR-0001 A/B layout). Fixed size so the B slot can hold a
# byte-identical partition image; label carries the sysupdate version
# (root_@v pattern in /etc/sysupdate.d). dm-verity hash partitions are
# the next step after the sysupdate flow is proven.
# 10G (was 8G): bundling llama.cpp, the Zen browser, and the forked
# gnome-control-center pushed the populated root to ~8.3 GiB, overflowing
# the old 8G cap. 10G leaves ~1.7 GiB headroom (models live in /var, not
# here, so root growth is slow). MUST match 11-root-b.conf — sysupdate
# writes this slot's byte image into the other. Whole layout
# (1G ESP + 2x10G root + >=2G var) = 23 GiB min, inside the smallest field
# target disk (28,000,002,048 bytes ~= 26 GiB); needs a 32 GB stick.
[Partition]
Type=root
Format=btrfs
CopyFiles=/
Label=root_1
SizeMinBytes=10G
SizeMaxBytes=10G
