    <!-- small spark, upper-left -->
    <path d="M4.5 1 L5.3 3.2 L7.5 4 L5.3 4.8 L4.5 7 L3.7 4.8 L1.5 4 L3.7 3.2 Z"/>
  </g>
</svg>
